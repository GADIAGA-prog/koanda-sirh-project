services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: koanda
      POSTGRES_PASSWORD: koanda
      POSTGRES_DB: koanda_sirh
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://koanda:koanda@db:5432/koanda_sirh
      SECRET_KEY: change-moi-en-production
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  pgdata:
