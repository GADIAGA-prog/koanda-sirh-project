# Blueprint Render — à placer à la RACINE du dépôt (koanda-sirh/render.yaml)
# Déploie TOUT le projet sur Render : l'API (Web Service) + le front (Static Site).
# Sur render.com : New > Blueprint > sélectionnez le dépôt.

services:
  - type: web
    name: koanda-sirh-api
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEMO_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: koanda-sirh-front
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
